"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory$git_branch$git_status${custom.aws}$gcloud$bun$nodejs$python$cmd_duration
$character"""

add_newline = false

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false
home_symbol = "~"

[git_branch]
symbol = "git:"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"

[custom.aws]
description = "Active AWS shell context"
shell = ["sh"]
when = """
test -n "${AWS_VAULT}${AWS_PROFILE}${AWSU_PROFILE}${AWSUME_PROFILE}${AWS_SSO_PROFILE}${AWS_REGION}${AWS_DEFAULT_REGION}${AWS_ACCESS_KEY_ID}${AWS_SECRET_ACCESS_KEY}${AWS_SESSION_TOKEN}${AWS_WEB_IDENTITY_TOKEN_FILE}${AWS_ROLE_ARN}"
"""
command = """
profile="${AWS_VAULT:-${AWS_PROFILE:-${AWSU_PROFILE:-${AWSUME_PROFILE:-${AWS_SSO_PROFILE:-}}}}}"
region="${AWS_REGION:-${AWS_DEFAULT_REGION:-}}"

if [ -n "$profile" ] && [ -n "$region" ]; then
  printf '%s (%s)' "$profile" "$region"
elif [ -n "$profile" ]; then
  printf '%s' "$profile"
elif [ -n "$region" ]; then
  printf '(%s)' "$region"
else
  printf 'env'
fi
"""
format = "[ $output]($style) "
style = "yellow"

[gcloud]
symbol = " "
format = "([ $project]($style) )"

[bun]
symbol = " "
format = "[$symbol$version]($style) "
version_format = "${raw}"

[nodejs]
symbol = "node:"
format = "[$symbol$version]($style) "
version_format = "${major}"

[python]
symbol = "py:"
python_binary = "python3"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 3000
style = "dimmed white"
format = "[$duration]($style) "

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vicmd_symbol = "[<](bold yellow)"
