[shell]
path_entries = [
  ".local/bin",
  ".bun/bin",
]
brew_candidates = [
  "/opt/homebrew/bin/brew",
  "/usr/local/bin/brew",
  "/home/linuxbrew/.linuxbrew/bin/brew",
]
ssh_agent_socket = ".1password/agent.sock"

[[shell.aliases]]
name = "b"
expansion = "bun"

[[shell.aliases]]
name = "bi"
expansion = "bun install"

[[shell.aliases]]
name = "br"
expansion = "bun run"

[[shell.aliases]]
name = "bx"
expansion = "bun x"

[[shell.aliases]]
name = "gst"
expansion = "git status"

[[shell.aliases]]
name = "gfl"
expansion = "git fetch && git pull"

[[shell.aliases]]
name = "pi"
expansion = "pnpm install"

[[shell.aliases]]
name = "px"
expansion = "pnpx"

[[shell.aliases]]
name = "prd"
expansion = "pnpm run dev"

[[shell.aliases]]
name = "prb"
expansion = "pnpm run build"

[[shell.aliases]]
name = "prs"
expansion = "pnpm run start"

[[shell.aliases]]
name = "prt"
expansion = "pnpm run test"

[[shell.aliases]]
name = "prl"
expansion = "pnpm run lint"

[[shell.aliases]]
name = "prf"
expansion = "pnpm run format"

[[shell.aliases]]
name = "dclaude"
expansion = "claude --dangerously-skip-permissions"

[[shell.aliases]]
name = "dcodex"
expansion = "codex --dangerously-bypass-approvals-and-sandbox"

[shell.tmux]
ssh_session_name = "main"
