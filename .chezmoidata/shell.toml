[shell]
path_entries = [
  ".local/bin",
  ".bun/bin",
]
brew_candidates = [
  "/opt/homebrew/bin/brew",
  "/usr/local/bin/brew",
  "/home/linuxbrew/.linuxbrew/bin/brew",
]

[[shell.aliases]]
name = "b"
expansion = "bun"

[[shell.aliases]]
name = "bi"
expansion = "bun install"

[[shell.aliases]]
name = "bx"
expansion = "bunx"

[[shell.aliases]]
name = "brd"
expansion = "bun run dev"

[[shell.aliases]]
name = "brb"
expansion = "bun run build"

[[shell.aliases]]
name = "brs"
expansion = "bun run start"

[[shell.aliases]]
name = "brt"
expansion = "bun run test"

[[shell.aliases]]
name = "brl"
expansion = "bun run lint"

[[shell.aliases]]
name = "brf"
expansion = "bun run format"

[[shell.aliases]]
name = "brc"
expansion = "bun run check"

[[shell.aliases]]
name = "cat"
expansion = "bat --paging=never"

[[shell.aliases]]
name = "cd"
expansion = "z"

[[shell.aliases]]
name = "ga"
expansion = "git add"

[[shell.aliases]]
name = "gd"
expansion = "git diff"

[[shell.aliases]]
name = "gfl"
expansion = "git fetch && git pull"

[[shell.aliases]]
name = "gl"
expansion = "git log --oneline --graph --decorate"

[[shell.aliases]]
name = "gp"
expansion = "git push"

[[shell.aliases]]
name = "grep"
expansion = "rg"

[[shell.aliases]]
name = "gs"
expansion = "git status"

[[shell.aliases]]
name = "l"
expansion = "eza -lh"

[[shell.aliases]]
name = "la"
expansion = "eza -a"

[[shell.aliases]]
name = "ll"
expansion = "eza -la --icons --octal-permissions --group-directories-first"

[[shell.aliases]]
name = "lt"
expansion = "eza --tree --level=2"

[[shell.aliases]]
name = "mkdir"
expansion = "mkdir -p"

[[shell.aliases]]
name = "procs"
expansion = "procs --pager disable --sorta mem"

[[shell.aliases]]
name = "sys"
expansion = "fastfetch"

[[shell.aliases]]
name = "pi"
expansion = "pnpm install"

[[shell.aliases]]
name = "px"
expansion = "pnpx"

[[shell.aliases]]
name = "prd"
expansion = "pnpm run dev"

[[shell.aliases]]
name = "prb"
expansion = "pnpm run build"

[[shell.aliases]]
name = "prs"
expansion = "pnpm run start"

[[shell.aliases]]
name = "prt"
expansion = "pnpm run test"

[[shell.aliases]]
name = "prl"
expansion = "pnpm run lint"

[[shell.aliases]]
name = "prf"
expansion = "pnpm run format"

[[shell.aliases]]
name = "prc"
expansion = "pnpm run check"

[[shell.aliases]]
name = "rsy"
expansion = "rsync -avh --progress"

[[shell.aliases]]
name = "dclaude"
expansion = "claude --dangerously-skip-permissions"

[[shell.aliases]]
name = "dcodex"
expansion = "codex --dangerously-bypass-approvals-and-sandbox"
